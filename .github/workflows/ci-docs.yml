name: Docs Quality Check & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 1. Проверка синтаксиса Markdown
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v9
        with:
          globs: "**/*.md"

      # 2. Проверка битых ссылок
      - name: Check Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'

      # 3. Валидация OpenAPI спецификации
      - name: Validate OpenAPI
        run: |
          pip install fastapi
          python -c "from main import app; import json; print(json.dumps(app.openapi()))" > openapi.json
          npx @stoplight/spectral-cli lint openapi.json

      # 4. Сборка MkDocs
      - name: Build Documentation
        run: |
          pip install mkdocs-material mike
          mkdocs build

      # 5. Сохранение результата как артефакта
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: documentation-site
          path: site/