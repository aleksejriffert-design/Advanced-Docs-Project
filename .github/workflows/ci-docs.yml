name: Docs Quality Check & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic mkdocs-material mike

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: Validate OpenAPI
        run: |
          python -c "from main import app; import json; print(json.dumps(app.openapi()))" > openapi.json
          # Используем npx для запуска линтера спецификации
          npx @stoplight/spectral-cli lint openapi.json || true

      - name: Build Documentation
        run: |
          mkdocs build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: site/